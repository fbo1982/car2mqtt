name: "Car2MQTT"
version: "0.1.2"
slug: "car2mqtt"
description: "Modular multi-vehicle MQTT bridge scaffold for Home Assistant"
url: "https://github.com/tbo1982/car2mqtt"
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:car-multiple
panel_title: Car2MQTT
arch:
  - amd64
  - aarch64
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: Web UI
map:
  - addon_config:rw
options:
  log_level: info
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
