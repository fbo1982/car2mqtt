name: "Car2MQTT"
version: "0.7.9"
slug: "car2mqtt"
description: "Multi-vehicle MQTT bridge with BMW wizard/auth flow for Home Assistant"
url: "https://github.com/tbo1982/car2mqtt"
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:car-multiple
panel_title: Car2MQTT
arch:
  - amd64
  - aarch64
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: Web UI
map:
  - addon_config:rw
options:
  log_level: info
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_base_topic: "car"
  mqtt_qos: 1
  mqtt_retain: true
  mqtt_tls: false
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  mqtt_host: str
  mqtt_port: port
  mqtt_username: str
  mqtt_password: password
  mqtt_base_topic: str
  mqtt_qos: list(0|1|2)
  mqtt_retain: bool
  mqtt_tls: bool
