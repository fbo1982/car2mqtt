name: "Car2MQTT"
version: "0.1.0"
slug: "car2mqtt"
description: >-
  Modular Home Assistant add-on for multiple vehicle manufacturers with MQTT publishing.
url: "https://github.com/example/car2mqtt"
arch:
  - amd64
  - aarch64
startup: application
boot: auto
ingress: true
ingress_port: 8099
panel_icon: mdi:car-multiple
panel_title: Car2MQTT
hassio_api: false
homeassistant_api: false
init: false
ports:
  8099/tcp: null
ports_description:
  8099/tcp: "Car2MQTT Web UI"
map:
  - type: addon_config
    read_only: false
options:
  log_level: info
  mqtt:
    host: core-mosquitto
    port: 1883
    username: ""
    password: ""
    base_topic: car
    qos: 1
    retain: true
  vehicles: []
schema:
  log_level: list(trace|debug|info|warning|error|fatal)
  mqtt:
    host: str
    port: port
    username: str?
    password: password?
    base_topic: str
    qos: int(0,2)
    retain: bool
  vehicles:
    - id: str
      label: str
      manufacturer: list(bmw|gwm)
      license_plate: str
      enabled: bool
      provider_config: {}
